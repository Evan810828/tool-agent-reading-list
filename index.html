<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tool Agent Reliability Reading List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./assets/style.css?v=7" />
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="#reading" class="site-logo">Tool Agent <span>Reading List</span></a>
            <div class="header-actions">
                <button id="theme-toggle" class="theme-btn" title="Toggle theme">Dark</button>
            </div>
        </div>
    </header>

    <main id="app">
        <section id="hero" class="hero">
            <div class="hero-content">
                <div class="hero-badge"><span class="hero-badge-dot"></span>Research Reading List</div>
                <h1>Tool Agent Reliability</h1>
                <p>Tracking research on reliable tool-using agents, trajectory verification, verifier models,
                    monitoring, failure detection, and selective prediction for LLM and AI agents.</p>
                <div class="hero-stats" id="hero-stats"></div>
                <div class="hero-actions">
                    <button class="hero-btn hero-btn-primary" id="hero-explore">Explore Papers</button>
                </div>
            </div>
        </section>

        <section id="reading" class="panel active">
            <div id="stats-section" class="stats-wrap"></div>
            <div class="section">
                <div class="reveal">
                    <h2 class="section-title">Reading List</h2>
                    <p class="section-sub" id="reading-summary"></p>
                </div>
                <div class="reveal">
                    <div class="filter-bar">
                        <button class="filter-chip" data-mode="formal">Curated</button>
                        <button class="filter-chip active" data-mode="latest">Latest (Keyword Search)</button>
                        <button class="filter-chip" data-mode="cites">Latest (Citations to Seeds)</button>
                        <div class="filter-divider"></div>
                        <div id="tag-filters" class="tag-filters"></div>
                        <input id="search-input" class="search-input" type="text"
                            placeholder="Search papers, abstracts, authors, or tags..." />
                    </div>
                </div>
                <div class="reveal">
                    <div id="reading-container"></div>
                </div>
            </div>
        </section>

    </main>

    <button id="back-to-top" title="Back to top">Top</button>

    <footer class="site-footer">
        <span>© <span id="year"></span> Tool Agent Reliability Reading List</span>
    </footer>

    <script src="./assets/app.js?v=7"></script>
</body>

</html>
